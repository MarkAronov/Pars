name: "Deploy"

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      skip-deploy:
        description: "Skip deploy steps"
        required: false
        default: "false"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ------------------------------------------------------------------
  # FLAG PARSING
  # ------------------------------------------------------------------
  flags:
    name: Determine Flags
    runs-on: ubuntu-latest
    outputs:
      skip_deploy: ${{ steps.set.outputs.skip_deploy }}
    steps:
      - name: Set flags
        id: set
        uses: actions/github-script@v6
        with:
          script: |
            const msg = (context.payload.head_commit && context.payload.head_commit.message) || ''
            const inps = context.payload.inputs || {}
            const has = (token, key) => (msg && msg.includes(token)) || (inps[key] === 'true')
            return { skip_deploy: has('[skip-deploy]', 'skip-deploy') ? 'true' : 'false' }

  # ------------------------------------------------------------------
  # BACKEND DEPLOY — Fly.io (two separate apps, each its own scale/rollback)
  # ------------------------------------------------------------------
  deploy-backend-nestjs:
    needs: flags
    if: ${{ needs.flags.outputs.skip_deploy != 'true' }}
    name: Deploy backend-nestjs to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        # Build context must be the repo root (not backend-nestjs/) — the
        # Dockerfile now also COPYs packages/db-adapters, which backend-nestjs
        # depends on and which Docker can't reach from a narrower context.
        run: flyctl deploy --remote-only --config backend-nestjs/fly.toml --dockerfile backend-nestjs/Dockerfile .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-backend-express:
    needs: flags
    if: ${{ needs.flags.outputs.skip_deploy != 'true' }}
    name: Deploy backend-express to Fly.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io
        # Same repo-root build context requirement as backend-nestjs — see above.
        run: flyctl deploy --remote-only --config backend-express/fly.toml --dockerfile backend-express/Dockerfile .
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ------------------------------------------------------------------
  # FRONTEND DEPLOY — Vercel
  # ------------------------------------------------------------------
  deploy-frontend:
    needs: flags
    if: ${{ needs.flags.outputs.skip_deploy != 'true' }}
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        working-directory: frontend
      - run: bun run build
        working-directory: frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: frontend
          vercel-args: "--prod"

  # ------------------------------------------------------------------
  # STORYBOOK DEPLOY — GitHub Pages
  # ------------------------------------------------------------------
  deploy-storybook:
    needs: flags
    if: ${{ needs.flags.outputs.skip_deploy != 'true' }}
    name: Deploy Storybook to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: "pages"
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install
        working-directory: frontend
      - run: bun run build:storybook
        working-directory: frontend
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/storybook-static
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
