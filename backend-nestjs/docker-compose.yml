include:
  - ../database-postgres-pgvector/docker-compose.yml

services:
  # Socket.IO cross-instance pub/sub adapter's Redis — app-specific, kept here
  # rather than shared with messaging-kafka/'s standalone BullMQ-demo Redis.
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data:
