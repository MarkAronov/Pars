services:
  mongodb:
    image: mongo:7
    command: ['--replSet', 'rs0', '--bind_ip_all']
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.runCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot: initiates the single-node replica set once mongodb is healthy.
  # A replica set (even single-node) is required for session.withTransaction(),
  # which the Mongo repository's multi-document cascades depend on.
  mongodb-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_healthy
    restart: 'no'
    entrypoint:
      - mongosh
      - --host
      - mongodb:27017
      - --quiet
      - --eval
      - |
        try {
          rs.status();
          print('replica set already initiated');
        } catch (e) {
          rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongodb:27017' }] });
          print('replica set initiated');
        }

volumes:
  mongodb_data:
