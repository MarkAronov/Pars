services:
  postgres:
    image: pgvector/pgvector:pg17
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pars_dev}
      POSTGRES_USER: ${POSTGRES_USER:-pars}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pars}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-pars}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
